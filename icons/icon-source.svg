<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Fond royal blue → violet diagonal -->
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%"  stop-color="#1a3a8e"/>
      <stop offset="50%" stop-color="#1a2a6e"/>
      <stop offset="100%" stop-color="#0b1238"/>
    </radialGradient>

    <!-- Bowl violet gradient (from HomeScreen Trophy) -->
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <!-- Lettre T gold gradient -->
    <linearGradient id="t-shape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffec80"/>
      <stop offset="50%"  stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Glow violet du trophée -->
    <radialGradient id="glow">
      <stop offset="0%"   stop-color="rgba(168,85,247,0.4)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0)"/>
    </radialGradient>

    <!-- Reflet brillant -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi (style Android adaptive icon, safe zone 80%) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Étoiles décoratives -->
  <g fill="rgba(255,255,255,0.5)">
    <circle cx="80"  cy="100" r="3"/>
    <circle cx="430" cy="80"  r="2.5"/>
    <circle cx="60"  cy="380" r="2.5"/>
    <circle cx="450" cy="420" r="3"/>
    <circle cx="200" cy="60"  r="1.8"/>
    <circle cx="380" cy="200" r="2"/>
    <circle cx="120" cy="150" r="1.5"/>
    <circle cx="420" cy="320" r="2"/>
    <circle cx="100" cy="280" r="1.8"/>
  </g>

  <!-- Glow violet derrière le trophée (effet "flotte") -->
  <ellipse cx="256" cy="280" rx="180" ry="120" fill="url(#glow)"/>

  <!-- ─── TROPHÉE 3D (réplique du Trophy de HomeScreen.jsx, scalé ×1.7) ─── -->
  <!-- Centré entre x=85 et x=425 (largeur 340), y=110 à y=440 -->
  <g transform="translate(73, 70) scale(1.755)">
    <!-- Ombre sous socle -->
    <ellipse cx="110" cy="222" rx="78" ry="14" fill="rgba(0,0,0,0.5)"/>

    <!-- Socle violet 3D -->
    <rect x="46" y="180" width="128" height="36" rx="6" fill="#5b21b6"/>
    <rect x="46" y="180" width="128" height="12" rx="6" fill="#7c3aed"/>

    <!-- Pied du trophée -->
    <rect x="80" y="155" width="60" height="28" fill="#5b21b6" rx="4"/>
    <rect x="80" y="155" width="60" height="8" fill="#a855f7" rx="4"/>

    <!-- Bowl du trophée — coupe violet 3D -->
    <path
      d="M 38 50 Q 38 30, 60 30 L 160 30 Q 182 30, 182 50 L 175 145 Q 170 165, 110 165 Q 50 165, 45 145 Z"
      fill="url(#bowl)"
      stroke="#3b0764"
      stroke-width="3"/>

    <!-- Lettre T or sur le trophée -->
    <path
      d="M 65 60 L 155 60 L 155 80 L 125 80 L 125 145 L 95 145 L 95 80 L 65 80 Z"
      fill="url(#t-shape)"
      stroke="#92400e"
      stroke-width="2.5"/>

    <!-- Highlight blanc sur le bord du bowl -->
    <path
      d="M 50 45 Q 50 38, 60 38 L 160 38"
      stroke="rgba(255,255,255,0.5)"
      stroke-width="3"
      fill="none"
      stroke-linecap="round"/>

    <!-- Reflet brillant en haut du bowl -->
    <path
      d="M 50 36 Q 60 30, 110 30 L 160 30 Q 170 33, 170 40 L 165 60 Q 130 50, 90 55 Q 60 58, 50 50 Z"
      fill="url(#shine)"/>

    <!-- Étincelles autour du trophée -->
    <g fill="#fff" opacity="0.9">
      <path d="M 20 60 L 23 54 L 26 60 L 23 66 Z"/>
      <path d="M 195 80 L 198 75 L 201 80 L 198 85 Z"/>
      <path d="M 15 140 L 18 136 L 21 140 L 18 144 Z"/>
      <path d="M 200 160 L 203 156 L 206 160 L 203 164 Z"/>
    </g>
  </g>

  <!-- "SUPER TETRIS" texte sous le trophée -->
  <g>
    <!-- Ombre du texte -->
    <text x="256" y="478" text-anchor="middle"
          font-family="'Lilita One', 'Arial Black', sans-serif"
          font-weight="900" font-size="38"
          fill="#000" opacity="0.5" dy="3"
          letter-spacing="2">SUPER TETRIS</text>
    <!-- Texte gold -->
    <text x="256" y="478" text-anchor="middle"
          font-family="'Lilita One', 'Arial Black', sans-serif"
          font-weight="900" font-size="38"
          fill="url(#t-shape)"
          stroke="#7c3aed" stroke-width="1.5"
          letter-spacing="2">SUPER TETRIS</text>
  </g>
</svg>
